<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>محلّل المشاعر</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">

    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="13" cy="13" r="11" stroke="white" stroke-width="1.8"/>
            <path d="M9 16s1.5 2.5 4 2.5 4-2.5 4-2.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="10" cy="11" r="1.3" fill="white"/>
            <circle cx="16" cy="11" r="1.3" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">محلّل المشاعر</span>
      </div>
      <p class="subtitle">اكتب أي جملة وسيكتشف مشاعرها بالذكاء الاصطناعي</p>
    </header>

    <div class="input-card">
      <textarea id="inputText" placeholder="اكتب جملتك هنا... مثلاً: أنا سعيد جداً بهذا اليوم الرائع!" maxlength="500"></textarea>
      <div class="input-footer">
        <span id="charCount">0 / 500</span>
        <button id="analyzeBtn" onclick="analyze()">
          <div class="spinner"></div>
          <svg class="btn-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M7 2l5 5-5 5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="btn-text">حلّل المشاعر</span>
        </button>
      </div>
    </div>

    <div class="result-card" id="resultBox">
      <div class="result-top">
        <div class="emotion-icon" id="emotionIcon">😊</div>
        <div class="result-info">
          <span class="result-label">الشعور المكتشف</span>
          <span class="result-emotion" id="emotionAr">—</span>
          <span class="sentiment-badge" id="sentimentBadge">—</span>
        </div>
        <div class="confidence-box">
          <span class="conf-num" id="confNum">—</span>
          <span class="conf-label">دقة</span>
        </div>
      </div>
      <div class="bars-section" id="barsContainer"></div>
    </div>

    <div class="feedback-card" id="feedbackBox">
      <div class="feedback-title">هل التحليل صحيح؟ ساعدنا على التعلم</div>
      <div class="feedback-btns">
        <button class="fb-btn fb-correct" onclick="sendFeedback(this,'correct')">✓ صحيح</button>
        <button class="fb-btn" onclick="sendFeedback(this,'joy')">😊 فرح</button>
        <button class="fb-btn" onclick="sendFeedback(this,'sadness')">😢 حزن</button>
        <button class="fb-btn" onclick="sendFeedback(this,'anger')">😠 غضب</button>
        <button class="fb-btn" onclick="sendFeedback(this,'fear')">😨 خوف</button>
        <button class="fb-btn" onclick="sendFeedback(this,'surprise')">😲 دهشة</button>
        <button class="fb-btn" onclick="sendFeedback(this,'neutral')">😐 محايد</button>
      </div>
      <div class="feedback-toast" id="feedbackToast">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" fill="#1D9E75"/>
          <path d="M4.5 7l2 2 3-3" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        شكراً! تم حفظ تصحيحك
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-lbl">جملة حُللت</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statAccuracy">—</span>
        <span class="stat-lbl">دقة المستخدمين</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statFeedback">0</span>
        <span class="stat-lbl">تصحيح محفوظ</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
